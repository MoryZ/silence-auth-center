server:
  port: 8096

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  application.name: auth-service
  profiles:
    active: dev
  messages.basename: messages/silence_auth_center_messages
  liquibase:
    change-log: classpath:/db/changelogs/changelog-master.xml
    enabled: false

platform:
  system:
    identifier: AC

silence:
  auth:
    center:
      jwt:
        secret: ${SILENCE_AUTH_CENTER_JWT_SECRET:silence-auth-center}
        expiration: ${SILENCE_AUTH_CENTER_JWT_EXPIRATION_SECONDS:21600}