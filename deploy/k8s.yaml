# K8s Deployment + Service 模板
# 使用方法：将此文件复制到你的项目 deploy/ 目录下，修改 metadata.name 和 container image
# 流水线配置中 k8s_manifest_path 填写: deploy/k8s-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-center          # 修改为你的服务名称
  namespace: default           # 修改为你的命名空间
  labels:
    app: auth-center
spec:
  replicas: 2                  # 副本数
  selector:
    matchLabels:
      app: auth-center
  template:
    metadata:
      labels:
        app: auth-center
    spec:
      containers:
        - name: auth-center  # 容器名称，与 k8s_container 配置一致
          image: auth-center:latest  # 镜像名称，与 docker_image 配置一致
          imagePullPolicy: IfNotPresent  # kind 本地镜像，不远程拉取
          ports:
            - containerPort: 8080  # 容器端口
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8096
            initialDelaySeconds: 60
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: auth-center
  namespace: default
  labels:
    app: auth-center
spec:
  type: ClusterIP
  ports:
    - port: 8096
      targetPort: 8096
      protocol: TCP
      name: http
  selector:
    app: auth-center
